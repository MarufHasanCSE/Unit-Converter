<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphic Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-card">
        <header>
            <h1>Converter</h1>
            <select id="mode-selector">
                <option value="length">Length</option>
                <option value="weight">Weight</option>
                <option value="temp">Temperature</option>
            </select>
        </header>

        <div class="input-wrapper">
            <div class="field">
                <span id="label-left">Meters</span>
                <input type="number" id="input-left" value="0">
            </div>

            <div class="divider">
                <div class="line"></div>
                <div class="icon">⇅</div>
                <div class="line"></div>
            </div>

            <div class="field">
                <span id="label-right">Feet</span>
                <input type="number" id="input-right" value="0">
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
