<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Unit Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="converter-card">
        <h2>Smart Converter</h2>
        
        <select id="mode-selector">
            <option value="length">Length (Meters ⇄ Feet)</option>
            <option value="weight">Weight (KG ⇄ Lbs)</option>
            <option value="temp">Temp (Celsius ⇄ Fahr)</option>
        </select>

        <div class="converter-body">
            <div class="input-box">
                <label id="label-left">Meters</label>
                <input type="number" id="input-left" value="0">
            </div>

            <div class="swap-icon">⇄</div>

            <div class="input-box">
                <label id="label-right">Feet</label>
                <input type="number" id="input-right" value="0">
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
